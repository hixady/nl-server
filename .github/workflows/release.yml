name: Build and Release

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  FLATC_URL: "https://github.com/google/flatbuffers/releases/download/v25.12.19-2026-02-06-03fffb2/Linux.flatc.binary.clang++-18.zip"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary: neverlose-server
            asset: nl-server-linux-x86_64
          - name: windows-x86_64
            target: x86_64-pc-windows-gnu
            binary: neverlose-server.exe
            asset: nl-server-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 unzip zip

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install flatc from release archive
        run: |
          mkdir -p "$RUNNER_TEMP/flatc"
          curl -fsSL "$FLATC_URL" -o "$RUNNER_TEMP/flatc.zip"
          unzip -q "$RUNNER_TEMP/flatc.zip" -d "$RUNNER_TEMP/flatc"
          FLATC_BIN="$(find "$RUNNER_TEMP/flatc" -type f -name flatc | head -n 1)"
          test -n "$FLATC_BIN"
          chmod +x "$FLATC_BIN"
          echo "$(dirname "$FLATC_BIN")" >> "$GITHUB_PATH"
          "$FLATC_BIN" --version

      - name: Configure Windows linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_AR=x86_64-w64-mingw32-ar" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage server binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  libraries:
    name: Package libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Zip libraries folder
        run: |
          mkdir -p dist
          zip -r dist/libraries.zip libraries

      - name: Upload libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: libraries
          path: dist/libraries.zip
          if-no-files-found: error

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Prepare Docker metadata
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          REF_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          IMAGE_TAG="$(echo "$REF_NAME" | tr '/:@' '---')"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  release:
    name: Publish GitHub release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - libraries
      - docker
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
